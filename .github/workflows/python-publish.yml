name: "Publish"

on:
  release:
    types: published

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync packages
        run: uv sync
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
